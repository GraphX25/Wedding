<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ნინი & გიორგი - ქორწილის მოსაწვევი</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&display=swap');
        
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; min-height: 100%; width: 100%;
            font-family: 'Playfair Display', serif;
            background-color: #fff5f5; color: #4a3b3c;
            overflow-x: hidden;
        }
        
        /* 🌸 პირველი გვერდი წამზომით */
        #welcome-screen {
            height: 100vh; width: 100vw; display: flex;
            align-items: center; justify-content: center;
            flex-direction: column;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 50%, #f9ebea 100%);
            position: fixed; z-index: 100;
            transition: opacity 1s ease;
            padding: 20px;
        }
        
        .countdown-title { 
            color: #7d5c60; font-size: 23px; margin-bottom: 30px; 
            font-style: italic; letter-spacing: 1px; text-align: center;
        }
        
        .countdown-container {
            display: flex; gap: 15px; margin-bottom: 50px; text-align: center;
            animation: fadeIn 1.5s ease;
        }
        
        .countdown-box {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(183, 110, 121, 0.25);
            padding: 20px 15px; border-radius: 16px; min-width: 80px;
            box-shadow: 0 10px 25px rgba(183, 110, 121, 0.06);
        }
        
        .countdown-time {
            font-size: 32px; font-weight: bold; color: #b76e79; display: block;
            margin-bottom: 2px;
        }
        
        .countdown-label { font-size: 11px; text-transform: uppercase; color: #8a7375; letter-spacing: 1px; }

        /* ელეგანტური Rose Gold ღილაკი */
        .open-btn {
            padding: 16px 50px; font-size: 19px; cursor: pointer;
            background: linear-gradient(135deg, #c59b9d 0%, #b76e79 100%);
            color: white; border: none;
            border-radius: 30px; box-shadow: 0 6px 20px rgba(183, 110, 121, 0.3);
            font-family: 'Playfair Display', serif; transition: all 0.3s;
            animation: pulse 2s infinite ease-in-out;
            letter-spacing: 1px;
        }
        .open-btn:hover { 
            transform: scale(1.04); 
            box-shadow: 0 8px 25px rgba(183, 110, 121, 0.45);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 6px 20px rgba(183, 110, 121, 0.3); }
            50% { transform: scale(1.03); box-shadow: 0 8px 25px rgba(183, 110, 121, 0.45); }
            100% { transform: scale(1); box-shadow: 0 6px 20px rgba(183, 110, 121, 0.3); }
        }
        
        /* ✨ მთავარი გვერდი */
