<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ნინი & გიორგი - ქორწილის მოსაწვევი</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&display=swap');
        
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; min-height: 100%; width: 100%;
            font-family: 'Playfair Display', serif;
            background-color: #ffdce3; color: #4a3b3c;
            overflow-x: hidden;
        }
        
        /* 🌸 პირველი გვერდი წამზომით - უფრო მკაფიო ვარდისფერი გრადიენტი */
        #welcome-screen {
            height: 100vh; width: 100vw; display: flex;
            align-items: center; justify-content: center;
            flex-direction: column;
            background: linear-gradient(135deg, #ffebf0 0%, #ffcad6 50%, #f3a2b3 100%);
            position: fixed; z-index: 100;
            transition: opacity 1s ease;
            padding: 20px;
        }
        
        .countdown-title { 
            color: #6b4348; font-size: 24px; margin-bottom: 30px; 
            font-style: italic; letter-spacing: 1px; text-align: center;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        
        .countdown-container {
            display: flex; gap: 15px; margin-bottom: 50px; text-align: center;
            animation: fadeIn 1.5s ease;
        }
        
        .countdown-box {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(183, 110, 121, 0.35);
            padding: 20px 15px; border-radius: 16px; min-width: 82px;
            box-shadow: 0 10px 25px rgba(183, 110, 121, 0.12);
        }
        
        .countdown-time {
            font-size: 32px; font-weight: bold; color: #b76e79; display: block;
            margin-bottom: 2px;
        }
        
        .countdown-label { font-size: 11px; text-transform: uppercase; color: #7a5f62; letter-spacing: 1px; }

        /* ელეგანტური მკაფიო ღილაკი */
        .open-btn {
            padding: 16px 55px; font-size: 19px; cursor: pointer;
            background: linear-gradient(135deg, #c59b9d 0%, #b76e79 100%);
            color: white; border: none;
            border-radius: 30px; box-shadow: 0 6px 22px rgba(183, 110, 121, 0.4);
            font-family: 'Playfair Display', serif; transition: all 0.3s;
            animation: pulse 2s infinite ease-in-out;
            letter-spacing: 1px;
        }
        .open-btn:hover { 
            transform: scale(1.04); 
            box-shadow: 0 8px 25px rgba(183, 110, 121, 0.55);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 6px 20px rgba(183, 110, 121, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 8px 25px rgba(183, 110, 121, 0.55); }
            100% { transform: scale(1); box-shadow: 0 6px 20px rgba(183, 110, 121, 0.4); }
        }
        
        /* ✨ მთავარი გვერდი - შესამჩნევი საქორწილო ვარდისფერი ფონი */
        #main-invite {
            display: none; min-height: 100vh; width: 100%;
            background: linear-gradient(135deg, #ffebf0 0%, #ffcad6 40%, #f5b0bd 100%);
            background-attachment: fixed;
            align-items: center; justify-content: flex-start; flex-direction: column;
            position: relative; animation: fadeIn 2s ease; padding: 60px 0;
        }
        
        /* 🤍 კონტრასტული თეთრი მინის ბლოკები */
        .content-box {
            position: relative; z-index: 2; 
            background: rgba(255, 255, 255, 0.75); 
            padding: 50px 35px; border-radius: 24px; text-align: center;
            max-width: 450px; width: 90%; margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(183, 110, 121, 0.15);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            animation: slideUp 1.5s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        
        /* 🏨 სასტუმროს ბლოკი */
        .hotel-box {
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px; border-radius: 24px; text-align: center;
            max-width: 450px; width: 90%; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(183, 110, 121, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        
        .hotel-img {
            width: 100%; height: 240px; object-fit: cover;
            border-radius: 16px; margin: 20px 0;
            box-shadow: 0 8px 22px rgba(0,0,0,0.06);
        }
        
        h1 { color: #5c4346; font-size: 38px; margin-bottom: 8px; margin-top: 0; font-weight: normal; }
        h2 { color: #b76e79; font-size: 24px; margin-top: 0; font-weight: normal; font-style: italic; }
        h3 { color: #4a3b3c; font-size: 22px; margin: 10px 0; font-weight: 600; }
        
        .subtitle { color: #7d6668; font-size: 18px; margin-bottom: 35px; font-style: italic; }
        
        .location-btn {
            display: inline-block; margin-top: 15px; padding: 14px 35px;
            background: linear-gradient(135deg, #c59b9d 0%, #b76e79 100%);
            border-radius: 25px; text-decoration: none;
            color: white; font-weight: bold; transition: all 0.3s; font-size: 15px;
            box-shadow: 0 4px 15px rgba(183,110,121,0.25);
        }
        .location-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(183,110,121,0.45); }
        
        .form-group { text-align: left; width: 100%; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #6b5356; font-size: 15px; font-weight: bold; }
        
        input { 
            width: 100%; padding: 14px; 
            border: 1px solid rgba(183, 110, 121, 0.3); 
            border-radius: 10px; font-size: 16px; font-family: inherit; 
            background-color: rgba(255, 255, 255, 0.95);
            color: #222; transition: all 0.3s;
        }
        input:focus { background-color: #ffffff; outline: none; border-color: #b76e79; box-shadow: 0 0 12px rgba(183,110,121,0.2); }
        
        .submit-btn { 
            width: 100%; padding: 15px; 
            background: linear-gradient(135deg, #c59b9d 0%, #b76e79 100%);
            color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: all 0.3s; font-family: inherit;
            box-shadow: 0 4px 15px rgba(183,110,121,0.25);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(183,110,121,0.35); }
        
        #thank-you { display: none; color: #4e8752; font-size: 22px; font-weight: bold; margin-top: 10px; }
        
        .scroll-hint { color: #8a686c; font-size: 14px; margin-top: 30px; font-style: italic; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } 60% { transform: translateY(-3px); } }

        /* 🌸 მოფარფატე ყვავილები */
        .particle { position: absolute; top: -20px; pointer-events: none; animation: fall linear forwards; z-index: 15; user-select: none; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.7; } 90% { opacity: 0.7; } 100% { transform: translateY(105vh) rotate(360deg) translateX(30px); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen">
        <div class="countdown-title">ქორწილამდე დარჩა:</div>
        <div class="countdown-container">
            <div class="countdown-box"><span class="countdown-time" id="days">00</span><span class="countdown-label">დღე</span></div>
            <div class="countdown-box"><span class="countdown-time" id="hours">00</span><span class="countdown-label">საათი</span></div>
            <div class="countdown-box"><span class="countdown-time" id="minutes">00</span><span class="countdown-label">წუთი</span></div>
            <div class="countdown-box"><span class="countdown-time" id="seconds">00</span><span class="countdown-label">წამი</span></div>
        </div>
        <button class="open-btn" onclick="openInvite()">მოსაწვევის გახსნა 💌</button>
    </div>

    <div id="main-invite">
        
        <div class="content-box">
            <h1>ნინი & გიორგი</h1>
            <p class="subtitle">სიყვარულით გიწვევთ ჩვენს ქორწილში</p>

            <form id="rsvp-form">
                <div class="form-group">
                    <label for="guest-name">სახელი და გვარი:</label>
                    <input type="text" id="guest-name" placeholder="მაგ: დათო ბერიძე" required>
                </div>
                <button type="submit" class="submit-btn" id="btn-text">დასტური</button>
            </form>
            <div id="thank-you">გელოდებით! მონაცემები გაგზავნილია. 🎉</div>
            
            <div class="scroll-hint">ჩამოსქროლეთ დეტალებისთვის ↓</div>
        </div>
        
        <div class="hotel-box">
            <h2>ქორწილის სივრცე</h2>
            <h3>In Gemi</h3> 
            <img src="photo.jpg" alt="სასტუმროს ფოტო" class="hotel-img">
            
            <a href="http://googleusercontent.com/maps.google.com/2" target="_blank" class="location-btn">
                📍 იხილეთ ლოკაცია რუკაზე
            </a>
        </div>
    </div>

    <script>
        // ⏰ ზუსტი დრო: 25 ივლისი, 2026 წელი, 15:00:00
        const weddingDate = new Date("Jul 25, 2026 15:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            if (distance < 0) {
                document.querySelector(".countdown-title").innerText = "დღეს ჩვენი ქორწილია! 🎉";
                document.querySelector(".countdown-container").style.display = "none";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function openInvite() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-invite').style.display = 'flex';
                document.getElementById('bg-music').play().catch(function(e){});
                setInterval(createParticle, 350);
            }, 1000);
        }

        function createParticle() {
            const container = document.getElementById('main-invite');
            if (!container || container.style.display !== 'flex') return;
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const items = ['🌸', '✨', '🤍', '🌸'];
            const randomItem = items[Math.floor(Math.random() * items.length)];
            particle.innerText = randomItem;
            particle.style.fontSize = Math.random() * 12 + 12 + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 4 + 6;
            particle.style.animationDuration = duration + 's';
            container.appendChild(particle);
            setTimeout(() => { particle.remove(); }, duration * 1000);
        }

        document.getElementById('rsvp-form').addEventListener('submit', function(e) {
            e.preventDefault();
            let btn = document.getElementById('btn-text');
            btn.innerText = "იგზავნება...";
            btn.disabled = true;

            let name = document.getElementById('guest-name').value;
            let webAppUrl = "https://script.google.com/macros/s/AKfycbwh5NGqdaeZoVeaXeTjgzJYSAs34fIO_-DUwkQ5OuDmwEQFx_naSQVYMWQwuWMt0vkJrw/exec"; 

            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, guests: 1 }) 
            }).then(() => {
                document.getElementById('rsvp-form').style.display = 'none';
                document.getElementById('thank-you').style.display = 'block';
            }).catch(error => {
                btn.innerText = "სცადეთ თავიდან";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
